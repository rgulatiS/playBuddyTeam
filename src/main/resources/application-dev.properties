# Development properties for Playbuddy
# Use a secure, random secret in production (don't commit real secrets)
app.jwt.secret=change-me-please-local-dev

# Access token validity in milliseconds (15 minutes)
app.jwt.access-ms=900000

# Refresh token validity in milliseconds (7 days)
app.jwt.refresh-ms=604800000

# OTP settings
app.otp.expiry-minutes=5
app.otp.max-attempts=5

# Example datasource (optional) - adjust for local dev
# spring.datasource.url=jdbc:postgresql://localhost:5432/playbuddy
# spring.datasource.username=postgres
# spring.datasource.password=postgres
