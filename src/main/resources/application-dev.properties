# Development properties for Playbuddy
# Use a secure, random secret in production (don't commit real secrets)
app.jwt.secret=change-me-please-local-dev

# Access token validity in milliseconds (15 minutes)
app.jwt.access-ms=900000

# Refresh token validity in milliseconds (7 days)
app.jwt.refresh-ms=604800000

# OTP settings
app.otp.expiry-minutes=5
app.otp.max-attempts=5

# H2 Database Persistence
spring.datasource.url=jdbc:h2:file:./data/playbuddy;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
